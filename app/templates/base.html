<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "CestaControl" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">CestaControl</a>
    <nav class="nav">
      <a href="/">Painel</a>
      <a href="/retiradas/nova">Nova retirada</a>
      <a href="/historico">Historico</a>
      <a href="/estoque">Estoque</a>
      <a href="/tecnicos">Tecnicos</a>
    </nav>
    <form method="post" action="/logout">
      <button class="button ghost" type="submit">Sair</button>
    </form>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
