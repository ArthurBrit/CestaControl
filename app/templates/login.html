<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar | CestaControl</title>
  <script>
    (function () {
      var theme = "light";
      try {
        theme = localStorage.getItem("theme") || "light";
      } catch (error) {
        theme = "light";
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}?v=20260512-2">
</head>
<body class="login-page">
  <button class="theme-toggle login-theme" type="button" data-theme-toggle aria-label="Alternar modo escuro">Tema</button>
  <main class="login-shell">
    <section class="login-panel">
      <p class="eyebrow">Controle interno</p>
      <h1>CestaControl</h1>
      <form method="post" action="/login" class="stack">
        {% if error %}<div class="alert">{{ error }}</div>{% endif %}
        <label>Usuario
          <input name="username" autocomplete="username" required autofocus>
        </label>
        <label>Senha
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="button primary full" type="submit">Entrar</button>
      </form>
    </section>
  </main>
  <script src="{{ url_for('static', path='/js/theme.js') }}?v=20260512-2"></script>
</body>
</html>
